version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aios-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aios_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aios_secure_pass_2026}
      POSTGRES_DB: ${POSTGRES_DB:-aios_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aios_user} -d ${POSTGRES_DB:-aios_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aios-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  neo4j:
    image: neo4j:5-community
    container_name: aios-neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/aios_neo4j_password_2026
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: aios-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-aios_minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-aios_minio_secure_secret}
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aios-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aios_user}:${POSTGRES_PASSWORD:-aios_secure_pass_2026}@postgres:5432/${POSTGRES_DB:-aios_db}
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aios-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  neo4jdata:
